        fill="none" stroke="rgba(108,99,255,0.06)" stroke-width="2"/>

  <!-- dot cluster bottom-right -->
  <circle cx="192" cy="175" r="5"   fill="rgba(108,99,255,0.07)"/>
  <circle cx="205" cy="158" r="3"   fill="rgba(108,99,255,0.05)"/>
  <circle cx="178" cy="162" r="3.5" fill="rgba(108,99,255,0.05)"/>

  <!-- tiny dot top-left -->
