<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220">

  <!-- large question mark -->
  <text x="12" y="72" font-size="58" font-family="Arial, sans-serif" fill="rgba(108,99,255,0.07)">?</text>

  <!-- star top-right -->
  <polygon points="168,14 172,27 186,27 175,35 179,48 168,40 157,48 161,35 150,27 164,27"
           fill="rgba(108,99,255,0.08)"/>

  <!-- small question mark -->
  <text x="118" y="140" font-size="28" font-family="Arial, sans-serif" fill="rgba(108,99,255,0.06)">?</text>

  <!-- small star mid-left -->
  <polygon points="42,108 45,118 55,118 47,124 50,134 42,128 34,134 37,124 29,118 39,118"
           fill="rgba(108,99,255,0.06)"/>

  <!-- trophy cup outline -->
