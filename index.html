<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Quiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<script>if(localStorage.getItem('theme')==='dark')document.body.classList.add('theme-dark');</script>

  <header class="header">
    <nav class="nav">
      <a href="index.html" class="nav__logo">
        <svg class="nav__logo-icon" width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#ff2d87"/>
              <stop offset="100%" stop-color="#7c00ff"/>
            </linearGradient>
          </defs>
          <rect x="1" y="1" width="32" height="32" rx="10" fill="url(#logoGrad)"/>
          <rect x="2" y="2" width="30" height="15" rx="9" fill="rgba(255,255,255,0.13)"/>
          <text x="17" y="23.5" text-anchor="middle" font-size="19" font-weight="900" fill="white" font-family="-apple-system,'Segoe UI',sans-serif">?</text>
          <path d="M27.5 5.2 L28.1 3.5 L28.7 5.2 L30.5 5.8 L28.7 6.4 L28.1 8.1 L27.5 6.4 L25.7 5.8Z" fill="rgba(255,255,255,0.75)"/>
        </svg>
        <span class="nav__logo-wordmark">Trivia<span class="nav__logo-accent"> Quiz</span></span>
      </a>
      <ul class="nav__links">
        <li><a href="index.html" class="nav__link nav__link--active">Home</a></li>
        <li><a href="results.html" class="nav__link">High Scores</a></li>
        <li>
          <button id="theme-toggle" class="theme-toggle" aria-label="Switch to dark mode">
            <svg class="theme-toggle__icon theme-toggle__icon--moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="theme-toggle__icon theme-toggle__icon--sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <main class="main">
    <section class="home">
      <article class="home__card">
        <h1 class="home__title">Welcome to <span class="home__title-accent">Trivia Quiz</span></h1>
        <p class="home__subtitle">Test your knowledge across dozens of categories.</p>

        <form id="settings-form" class="form" novalidate>

          <div class="form__group">
            <label for="username" class="form__label">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form__input"
              placeholder="Enter your name"
              required
              minlength="2"
              maxlength="20"
              autocomplete="off"
            >
            <span class="form__error" id="username-error"></span>
          </div>

          <div class="form__group">
            <label for="category" class="form__label">Category</label>
            <select id="category" name="category" class="form__select">
              <option value="0">Any Category</option>
              <option value="9">General Knowledge</option>
              <option value="10">Entertainment: Books</option>
              <option value="11">Entertainment: Film</option>
              <option value="12">Entertainment: Music</option>
              <option value="17">Science &amp; Nature</option>
              <option value="18">Science: Computers</option>
              <option value="21">Sports</option>
              <option value="22">Geography</option>
              <option value="23">History</option>
              <option value="25">Art</option>
            </select>
          </div>

          <fieldset class="form__fieldset">
            <legend class="form__legend">Difficulty</legend>
            <div class="form__radio-group">
              <label class="form__radio-label">
                <input type="radio" name="difficulty" value="easy" class="form__radio">
                Easy
              </label>
              <label class="form__radio-label">
                <input type="radio" name="difficulty" value="medium" class="form__radio" checked>
                Medium
              </label>
              <label class="form__radio-label">
                <input type="radio" name="difficulty" value="hard" class="form__radio">
                Hard
              </label>
            </div>
          </fieldset>

          <button type="submit" class="btn btn--primary">Start Quiz</button>
        </form>
      </article>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/theme.js"></script>
</body>
</html>
